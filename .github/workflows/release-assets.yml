name: Release Assets

# REMINDER (v2.8.0 WS4): before tagging, confirm tests/offline-smoke-test.md's timing
# scorecard has been refreshed for this release (see CONTRIBUTING.md §Pre-release
# checklist). This workflow does not and cannot enforce that automatically — it is a
# maintainer step, not a CI gate — but a tag pushed without a current scorecard means
# the README "15 minutes" claim is shipping unverified for this release.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & upload release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Build release archives
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PREFIX="cowork-starter-kit-${VERSION}/"
          git archive --format=zip --prefix="${PREFIX}" "${TAG}" > "cowork-starter-kit-${VERSION}.zip"
          git archive --format=tar.gz --prefix="${PREFIX}" "${TAG}" > "cowork-starter-kit-${VERSION}.tar.gz"
          ls -lh cowork-starter-kit-${VERSION}.*

      - name: Verify archive contents
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          ZIP="cowork-starter-kit-${VERSION}.zip"
          LISTING="$(unzip -Z1 "${ZIP}")"

          # Negative assertions — these MUST NOT appear in the archive.
          # v2.8.0 WS5 (ADR-037): the ~10 individually-named docs/ entries collapsed to a
          # single docs/internal/ prefix-match, which covers the whole 40-file subtree
          # (docs/internal/{qa,security,compliance,process,planning}/) plus any future file
          # placed there. docs/research/ and docs/project-audit-v2.6.1.md REMOVED (now public,
          # see KEEP_PATHS below). docs/patterns.md ADDED (Council-tooling exempt, still internal).
          DROP_PATHS=(
            ".gitignore"
            ".markdownlint.jsonc"
            ".markdownlintignore"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            ".github/"
            "tests/"
            "upstream-contribution/"
            "scripts/install-pre-commit.sh"
            "docs/spec.md"
            "docs/retro.md"
            "docs/patterns.md"
            "docs/internal/"
            ".gitattributes"
          )
          for path in "${DROP_PATHS[@]}"; do
            if printf '%s\n' "${LISTING}" | grep -E "^cowork-starter-kit-${VERSION}/${path}" >/dev/null; then
              echo "FAIL: DROP-list path present in archive: ${path}"
              exit 1
            fi
          done

          # Positive assertions — these MUST be present (guards against over-greedy export-ignore).
          # v2.8.0 WS5: docs/research/, docs/project-audit-v2.6.1.md, docs/how-it-works.md,
          # docs/faq.md, and TRUST.md added — all newly public credibility assets.
          KEEP_PATHS=(
            "VERSION"
            "README.md"
            "LICENSE"
            "WIZARD.md"
            "SETUP-CHECKLIST.md"
            "cowork.lock.json"
            "CLAUDE.md"
            "TRUST.md"
            "scripts/setup-folders.sh"
            "scripts/setup-folders.ps1"
            "docs/architecture.md"
            "docs/project-audit-v2.6.1.md"
            "docs/research/v2.2-skill-landscape.md"
            "docs/research/v2.7-usercase-test-and-improvement-research.md"
            "docs/how-it-works.md"
            "docs/faq.md"
            "vendored/agency-agents/LICENSE"
          )
          for path in "${KEEP_PATHS[@]}"; do
            if ! printf '%s\n' "${LISTING}" | grep -E "^cowork-starter-kit-${VERSION}/${path}$" >/dev/null; then
              echo "FAIL: KEEP-list path missing from archive: ${path}"
              exit 1
            fi
          done

          echo "PASS: archive contents verified (DROP=${#DROP_PATHS[@]}, KEEP=${#KEEP_PATHS[@]})"

      - name: Upload assets to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            cowork-starter-kit-*.zip
            cowork-starter-kit-*.tar.gz
          fail_on_unmatched_files: true
